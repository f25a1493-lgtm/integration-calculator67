<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Integration Calculator</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f7fb;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
        .controls {
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #e0f2fe;
            border-left: 4px solid #0284c7;
            border-radius: 4px;
        }
        .result-title { font-weight: bold; color: #0369a1; }
        .result-value { font-size: 24px; font-weight: bold; margin-top: 5px; color: #0c4a6e; }
        .canvas-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        canvas {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            max-width: 100%;
        }
    </style>
</head>
<body>

<h2 style="text-align: center; color: #1e293b;">Riemann Sum & Integration Animator</h2>

<div class="container">
    <div class="controls">
        <div class="input-group">
            <label>Function f(x)</label>
            <input type="text" id="fx" value="x*x - 2*x + 3">
            <small style="color: #64748b; font-size: 11px;">Use standard JS math (e.g., x*x or Math.sin(x))</small>
        </div>
        <div class="input-group">
            <label>Lower Bound (a)</label>
            <input type="number" id="boundA" value="0" step="any">
        </div>
        <div class="input-group">
            <label>Upper Bound (b)</label>
            <input type="number" id="boundB" value="3" step="any">
        </div>
        <div class="input-group">
            <label>Subintervals (n)</label>
            <input type="number" id="intervals" value="100" min="1" max="500">
        </div>
        <div class="input-group">
            <label>Riemann Sum Type</label>
            <select id="sumType">
                <option value="left">Left Riemann Sum</option>
                <option value="right">Right Riemann Sum</option>
                <option value="midpoint">Midpoint Riemann Sum</option>
                <option value="trapezoid">Trapezoidal Rule</option>
            </select>
        </div>
        
        <div class="result-box">
            <div class="result-title">Approximated Area:</div>
            <div class="result-value" id="areaResult">0.0000</div>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="plotCanvas" width="600" height="450"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('plotCanvas');
    const ctx = canvas.getContext('2d');

    // Inputs
    const fxInput = document.getElementById('fx');
    const aInput = document.getElementById('boundA');
    const bInput = document.getElementById('boundB');
    const nInput = document.getElementById('intervals');
    const typeInput = document.getElementById('sumType');
    const resultDisplay = document.getElementById('areaResult');

        try {
            // Safe evaluation substitution for basic algebra expressions
            let expr = fxInput.value.replace(/x/g, `(${x})`);
            return Function(`return ${expr}`)();
        } catch(e) {
            return 0;
        }
    }

        const b = parseFloat(bInput.value);
        const n = parseInt(nInput.value);

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const graphWidth = canvas.width - 2 * padding;
        const graphHeight = canvas.height - 2 * padding;
